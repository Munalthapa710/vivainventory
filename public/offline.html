<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f97316" />
    <title>VivaInventory Offline</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(249, 115, 22, 0.18), transparent 32%),
          linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
        color: #0f172a;
      }

      .panel {
        width: min(100%, 440px);
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 32px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 24px 64px rgba(15, 23, 42, 0.12);
        padding: 32px 28px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        background: #fff7ed;
        color: #ea580c;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        padding: 10px 14px;
        text-transform: uppercase;
      }

      .logo {
        width: 88px;
        height: 88px;
        display: block;
      }

      h1 {
        margin: 20px 0 0;
        font-size: clamp(30px, 7vw, 42px);
        line-height: 1.05;
      }

      p {
        margin: 16px 0 0;
        color: #475569;
        font-size: 15px;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 28px;
        border-radius: 18px;
        background: #f97316;
        color: #ffffff;
        font-weight: 700;
        padding: 14px 18px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <img class="logo" src="/logo.svg" alt="VivaInventory logo" />
      <div class="badge">Offline Mode</div>
      <h1>VivaInventory is temporarily offline.</h1>
      <p>
        Your connection dropped, so live inventory data is unavailable right now.
        Reconnect and reopen the app to continue working with the latest stock records.
      </p>
      <a href="/login">Retry connection</a>
    </main>
  </body>
</html>
